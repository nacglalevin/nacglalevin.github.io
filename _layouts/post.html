---
layout: default
---

<div class="container">
  <div class="row">
    <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">

      <article>
        <header>
          <h1>{{ page.title }}</h1>
          <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.author %} · {{ page.author }}{% endif %}{% if page.tags %} · 
            {% for tag in page.tags %}
              <a href="/tags.html#{{ tag }}">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
            {% endfor %}
          {% endif %}</p>
        </header>

        <div class="post-content">
          {{ content }}
        </div>
      </article>

    </div>
  </div>
</div>
